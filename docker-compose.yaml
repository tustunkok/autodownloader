services:
  autodownloader:
    build:
      context: .
      dockerfile: Dockerfile.openvpn
    ports:
      - "8000:8000"
    environment:
      RETENTION_SECONDS: "86400"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./autodownloader.conf:/etc/openvpn/autodownloader.conf:ro
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
